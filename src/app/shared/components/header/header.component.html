<header class="header">
    <div class="container" style="width: 100%;">
        <div class="header__wrapper">
            <a routerLink="/home" class="header-logo">
                MAHMOUD<br>SAYED
            </a>
            <nav class="header__menu">
                <ul>
                    <li><a routerLink="/about" routerLinkActive="active" class="link"><span>{{ t(nav.about) }}</span></a></li>
                    <li><a routerLink="/projects" routerLinkActive="active" class="link"><span>{{ t(nav.projects) }}</span></a></li>
                    <li><a routerLink="/experience" routerLinkActive="active" class="link"><span>{{ t(nav.experience) }}</span></a></li>
                    <li>
                        <button class="theme-toggle link" (click)="themeService.toggleTheme()">
                            <span>{{ themeService.isDarkMode() ? 'LIGHT' : 'DARK' }}</span>
                        </button>
                    </li>
                    <li>
                        <button class="lang-toggle link" (click)="langService.toggleLanguage()">
                            <span>{{ langService.currentLanguage() === 'en' ? 'AR' : 'EN' }}</span>
                        </button>
                    </li>
                </ul>
            </nav>
            <a routerLink="/contact" class="header-contact link-line">
                <span>{{ t(nav.contact) }}</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"></line><polyline points="10 5 19 5 19 14"></polyline></svg>
            </a>
        </div>
    </div>
</header>
