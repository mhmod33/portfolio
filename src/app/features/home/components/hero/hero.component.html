<section id="home" class="hero">
    
    <div class="hero-socials reveal-fade delay-4">
        <a href="https://www.linkedin.com/in/mahmoud-sayed-ali/" target="_blank">LINKEDIN</a>
        <a href="https://github.com/mhmod33" target="_blank">GITHUB</a>
        <!-- Using a placeholder for behance since it's not in the previous info, but usually it's standard -->
        <a href="https://www.behance.net/" target="_blank">BEHANCE</a>
    </div>

    <div class="hero-title">
        <div class="shatter-wrapper">
            <h2 class="shatter-text">
                <span class="shatter-line">
                    <span class="shatter-word">{{ t({ en: 'FULLSTACK', ar: 'مطور ويب' }) }}</span>
                    <span class="shatter-word">{{ t({ en: 'DEVELOPER', ar: 'متكامل' }) }}</span>
                </span>
                <span class="shatter-line">
                    <span class="shatter-word">{{ t({ en: '& UI/UX', ar: 'ومصمم' }) }}</span>
                    <span class="shatter-word">{{ t({ en: 'DESIGNER', ar: 'واجهات' }) }}</span>
                </span>
            </h2>
        </div>
    </div>
    
    <div class="hero-designer">
        <div class="hero-designer__descr">
            <div class="reveal-wrapper">
                <p class="hero-name reveal-inner delay-2">{{ t(hero.name) }}</p>
            </div>
            
            <div class="hero-description reveal-wrapper">
                <p class="reveal-inner delay-3">{{ t(hero.description) }}</p>
            </div>

            <div class="hero-actions reveal-wrapper">
                <div class="reveal-inner delay-4">
                    <a routerLink="/projects" class="hero-recent link-line">
                        <span>{{ t(hero.viewWork) }}</span>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"></line><polyline points="10 5 19 5 19 14"></polyline></svg>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="hero-designer__img">
            <img src="assets/profile.jpg" alt="Profile" class="profile-img">
        </div>
    </div>
    
    <div class="hero-based">
        <span class="reveal-inner delay-4">BASED IN EGYPT</span>
    </div>
</section>
